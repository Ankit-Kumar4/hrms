services:
  - type: web
    name: hrms-backend
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-url.vercel.app
databases:
  - name: hrms-db
    databaseName: hrms
    user: hrms_user